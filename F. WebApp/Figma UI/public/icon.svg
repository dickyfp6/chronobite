<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="128" fill="url(#bgGradient)"/>

  <!-- Letter N -->
  <text x="256" y="340" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="320" font-weight="bold" fill="white" text-anchor="middle">N</text>

  <!-- Optional: Add utensils icon -->
  <g transform="translate(256, 420)" fill="white" opacity="0.8">
    <circle cx="-30" cy="0" r="6"/>
    <circle cx="30" cy="0" r="6"/>
  </g>
</svg>
